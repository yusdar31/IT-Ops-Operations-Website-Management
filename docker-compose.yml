# Generated by Antigravity
version: '3.8'

services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: it_ops_hub
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  auth-api:
    build: 
      context: ./services/auth-api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=it_ops_hub
      - JWT_SECRET=dev-secret-local-only
      - PORT=3001
    depends_on:
      - db

  asset-api:
    build: 
      context: ./services/asset-api
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=it_ops_hub
      - JWT_SECRET=dev-secret-local-only
      - PORT=3002
    depends_on:
      - db

  ticket-api:
    build: 
      context: ./services/ticket-api
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=it_ops_hub
      - REDIS_HOST=redis
      - JWT_SECRET=dev-secret-local-only
      - PORT=3003
    depends_on:
      - db
      - redis

  notification-worker:
    build: 
      context: ./services/notification-worker
      dockerfile: Dockerfile
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=it_ops_hub
      - REDIS_HOST=redis
      # - SES_FROM_EMAIL=your-email@example.com
      # - AWS_REGION=us-east-1
      # - AWS_ACCESS_KEY_ID=xxx
      # - AWS_SECRET_ACCESS_KEY=xxx
    depends_on:
      - db
      - redis

  frontend:
    build: 
      context: ./services/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - auth-api
      - asset-api
      - ticket-api

volumes:
  db_data:
